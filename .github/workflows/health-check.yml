name: Health Check

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name health-test ${{ secrets.DOCKER_USERNAME }}/myapp:latest

      - name: Wait for app to start
        run: sleep 5

      - name: Health check
        id: health
        run: |
          if curl -f http://localhost:5000/health; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Cleanup container
        if: always()
        run: docker rm -f health-test

      - name: Write summary
        if: always()
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ secrets.DOCKER_USERNAME }}/myapp:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.health.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY