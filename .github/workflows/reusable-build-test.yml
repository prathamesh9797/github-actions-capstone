name: Reusable Build and Test

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
      run_tests:
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        if: ${{ inputs.run_tests }}
        env:
          PYTHONPATH: .
        run: pytest